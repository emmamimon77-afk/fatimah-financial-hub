<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Contact Messages | Fatimah Financial Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #1e293b;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
        }
        h1 {
            font-size: 32px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            text-align: center;
        }
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #312e81;
        }
        .stat-label {
            color: #64748b;
            font-size: 14px;
        }
        .message-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .message-card.unread {
            border-left: 4px solid #fbbf24;
            background: #fffbeb;
        }
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .message-sender {
            font-weight: 600;
            color: #1e293b;
        }
        .message-email {
            color: #64748b;
            font-size: 13px;
        }
        .message-date {
            color: #94a3b8;
            font-size: 12px;
        }
        .message-subject {
            font-weight: 500;
            color: #312e81;
            margin-bottom: 10px;
            padding: 5px 10px;
            background: #f1f5f9;
            border-radius: 8px;
            display: inline-block;
            font-size: 13px;
        }
        .message-content {
            color: #475569;
            margin: 15px 0;
            line-height: 1.6;
            padding: 15px;
            background: #f8fafc;
            border-radius: 12px;
        }
        .message-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-read {
            background: #e2e8f0;
            color: #475569;
        }
        .btn-read.read {
            background: #d1fae5;
            color: #10b981;
        }
        .btn-delete {
            background: #fee2e2;
            color: #ef4444;
        }
        .btn-refresh {
            background: #312e81;
            color: white;
            padding: 10px 20px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        .empty {
            text-align: center;
            padding: 60px;
            color: #94a3b8;
        }
        .footer {
            text-align: center;
            padding: 30px;
            color: #94a3b8;
            margin-top: 40px;
            border-top: 1px solid #e2e8f0;
        }
        .auth-error {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-envelope"></i> Contact Messages</h1>
            <button class="btn btn-refresh" onclick="loadMessages()">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>

        <div id="stats" class="stats"></div>
        <div id="messagesList"></div>
    </div>
    <div class="footer">
        <p>Admin Dashboard • Messages are stored securely</p>
        <p>© 1447-1448 AH / 2026 CE Fatimah Financial Hub</p>
    </div>

    <script>
        const AUTH_TOKEN = 'Bearer fatimah-admin-2026';
        
        async function loadMessages() {
            const messagesDiv = document.getElementById('messagesList');
            messagesDiv.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading messages...</div>';
            
            try {
                const response = await fetch('/api/contact/messages', {
                    headers: { 'Authorization': AUTH_TOKEN }
                });
                
                if (response.status === 401) {
                    messagesDiv.innerHTML = `
                        <div class="auth-error">
                            <i class="fas fa-lock" style="font-size: 48px; color: #ef4444;"></i>
                            <h2>Access Denied</h2>
                            <p>Please enter the admin password to view messages.</p>
                            <button onclick="promptPassword()" class="btn btn-refresh" style="margin-top: 20px;">
                                <i class="fas fa-key"></i> Enter Password
                            </button>
                        </div>
                    `;
                    return;
                }
                
                const data = await response.json();
                
                if (data.success && data.messages) {
                    displayMessages(data.messages);
                    displayStats(data.messages);
                } else {
                    throw new Error('Failed to load messages');
                }
                
            } catch (error) {
                console.error('Error loading messages:', error);
                messagesDiv.innerHTML = '<div class="empty">Error loading messages. Please try again.</div>';
            }
        }
        
        function displayMessages(messages) {
            const messagesDiv = document.getElementById('messagesList');
            
            if (messages.length === 0) {
                messagesDiv.innerHTML = '<div class="empty"><i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 20px; display: block;"></i> No messages yet</div>';
                return;
            }
            
            let html = '';
            messages.forEach(msg => {
                const date = new Date(msg.createdAt);
                const dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
                const unreadClass = !msg.read ? 'unread' : '';
                
                html += `
                    <div class="message-card ${unreadClass}" data-id="${msg._id}">
                        <div class="message-header">
                            <div>
                                <div class="message-sender">${escapeHtml(msg.name)}</div>
                                <div class="message-email">${escapeHtml(msg.email)}</div>
                            </div>
                            <div class="message-date">${dateStr}</div>
                        </div>
                        <div class="message-subject">
                            <i class="fas fa-tag"></i> ${escapeHtml(msg.subject)}
                        </div>
                        <div class="message-content">
                            ${escapeHtml(msg.message).replace(/\n/g, '<br>')}
                        </div>
                        <div class="message-actions">
                            <button class="btn btn-read ${msg.read ? 'read' : ''}" onclick="markRead('${msg._id}', ${msg.read})">
                                <i class="fas fa-${msg.read ? 'check-circle' : 'envelope'}"></i>
                                ${msg.read ? 'Read' : 'Mark as Read'}
                            </button>
                            <button class="btn btn-delete" onclick="deleteMessage('${msg._id}')">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                `;
            });
            
            messagesDiv.innerHTML = html;
        }
        
        function displayStats(messages) {
            const total = messages.length;
            const unread = messages.filter(m => !m.read).length;
            const today = messages.filter(m => {
                const msgDate = new Date(m.createdAt).toDateString();
                const todayDate = new Date().toDateString();
                return msgDate === todayDate;
            }).length;
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${total}</div>
                    <div class="stat-label">Total Messages</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${unread}</div>
                    <div class="stat-label">Unread</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${today}</div>
                    <div class="stat-label">Today</div>
                </div>
            `;
        }
        
        async function markRead(id, currentlyRead) {
            if (currentlyRead) return;
            
            try {
                await fetch(`/api/contact/messages/${id}/read`, {
                    method: 'PUT',
                    headers: { 'Authorization': AUTH_TOKEN }
                });
                loadMessages();
            } catch (error) {
                console.error('Error marking as read:', error);
                alert('Failed to mark as read');
            }
        }
        
        async function deleteMessage(id) {
            if (!confirm('Are you sure you want to delete this message?')) return;
            
            try {
                await fetch(`/api/contact/messages/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': AUTH_TOKEN }
                });
                loadMessages();
            } catch (error) {
                console.error('Error deleting message:', error);
                alert('Failed to delete message');
            }
        }
        
        function promptPassword() {
            const password = prompt('Enter admin password:');
            if (password === 'Fatimah2026') {
                // Store token and reload
                localStorage.setItem('admin_auth', 'Bearer fatimah-admin-2026');
                loadMessages();
            } else if (password !== null) {
                alert('Incorrect password');
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Check for stored auth on load
        const storedAuth = localStorage.getItem('admin_auth');
        if (storedAuth) {
            // Use stored auth
        }
        
        loadMessages();
        
        // Auto refresh every 30 seconds
        setInterval(loadMessages, 30000);
    </script>
</body>
</html>
