<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Chat - Fatimah Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }

        .header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo i {
            color: #fbbf24;
        }
        .nav-links {
            display: flex;
            gap: 30px;
        }
        .nav-links a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .video-card {
            background: #1e293b;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .video-card h3 {
            color: white;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .video-card video {
            width: 100%;
            background: #0f172a;
            border-radius: 16px;
            min-height: 300px;
        }

        .controls {
            background: #1e293b;
            border-radius: 60px;
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.2s;
        }
        .control-btn:hover {
            transform: scale(1.05);
        }
        .btn-call {
            background: #10b981;
            color: white;
        }
        .btn-hangup {
            background: #ef4444;
            color: white;
        }
        .btn-mute {
            background: #334155;
            color: white;
        }
        .btn-video {
            background: #334155;
            color: white;
        }

        .users-panel {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .users-panel h3 {
            color: white;
            margin-bottom: 15px;
        }
        .users-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #334155;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .user-item:hover {
            background: #475569;
        }
        .user-item.selected {
            background: #10b981;
        }
        .user-name {
            color: white;
            font-weight: 500;
        }
        .user-status {
            color: #10b981;
            font-size: 12px;
        }

        .chat-panel {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
        }
        .chat-messages {
            height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
            padding: 10px;
            background: #0f172a;
            border-radius: 12px;
        }
        .chat-message {
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 12px;
            max-width: 80%;
        }
        .chat-message.self {
            background: #10b981;
            color: white;
            margin-left: auto;
            text-align: right;
        }
        .chat-message.other {
            background: #334155;
            color: white;
        }
        .chat-message.system {
            background: #f59e0b;
            color: white;
            text-align: center;
            margin: 5px auto;
        }
        .chat-input {
            display: flex;
            gap: 10px;
        }
        .chat-input input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #334155;
            color: white;
        }
        .chat-input button {
            padding: 12px 24px;
            background: #10b981;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
        }

        .incoming-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            z-index: 1000;
            display: none;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .incoming-modal button {
            margin: 10px;
            padding: 10px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
        .accept-call {
            background: #10b981;
            color: white;
        }
        .reject-call {
            background: #ef4444;
            color: white;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            z-index: 999;
        }

        .footer {
            background: #0f172a;
            padding: 30px;
            text-align: center;
            color: #94a3b8;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav">
            <div class="logo">
                <i class="fas fa-mosque"></i>
                Fatimah Hub
            </div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/trading">Trading</a>
                <a href="/telephony">Telephony</a>
                <a href="/economics">Economics</a>
            </div>
        </nav>
    </header>

    <div style="background: #312e81; padding: 12px 20px; text-align: center; margin-bottom: 20px; border-radius: 8px;">
        <a href="/telephony" style="color: white; margin-right: 30px; font-weight: 600; text-decoration: none;">
           <i class="fas fa-comments"></i> Text Chat
        </a>
        <a href="/telephony/video-chat.html" style="color: #fbbf24; font-weight: 600; text-decoration: none;">
            <i class="fas fa-video"></i> Video Chat (Beta)
        </a>
    </div>

    <div class="container">
        <div class="users-panel">
            <h3><i class="fas fa-users"></i> Online Traders</h3>
            <div class="users-list" id="usersList">
                <div style="color: #64748b; text-align: center; padding: 20px;">Loading users...</div>
            </div>
        </div>

        <div class="video-grid">
            <div class="video-card">
                <h3><i class="fas fa-user"></i> You</h3>
                <video id="localVideo" autoplay muted playsinline></video>
                <button id="startVideoBtn" onclick="startVideoAndAudio()" style="margin-top: 15px; padding: 12px; background: #10b981; color: white; border: none; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 600;">
                    <i class="fas fa-play"></i> Start Camera & Mic
                </button>
            </div>
            <div class="video-card">
                <h3><i class="fas fa-user-friends"></i> Remote User</h3>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn btn-call" id="callBtn" onclick="startCall()">
                <i class="fas fa-phone"></i>
            </button>
            <button class="control-btn btn-hangup" id="hangupBtn" onclick="hangUp()" style="display: none;">
                <i class="fas fa-phone-slash"></i>
            </button>
            <button class="control-btn btn-mute" onclick="toggleMute()">
                <i class="fas fa-microphone"></i>
            </button>
            <button class="control-btn btn-video" onclick="toggleVideo()">
                <i class="fas fa-video"></i>
            </button>
        </div>

        <div class="chat-panel">
            <h3 style="color: white; margin-bottom: 15px;"><i class="fas fa-comment"></i> Chat</h3>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="incoming-modal" id="incomingModal">
        <h3 style="color: white; margin-bottom: 20px;"><i class="fas fa-phone-alt"></i> Incoming Call</h3>
        <p style="color: white; margin-bottom: 20px;" id="callerName">Someone is calling...</p>
        <button class="accept-call" onclick="acceptCall()">Accept</button>
        <button class="reject-call" onclick="rejectCall()">Reject</button>
    </div>

    <footer class="footer">
        <div class="arabic-footer">الحمد لله</div>
        <p>© 1447-1448 AH / 2026 CE Fatimah Financial Hub</p>
    </footer>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // ========== CONFIGURATION ==========
        const socket = io();
        let myStream = null;
        let peerConnection = null;
        let currentCallWith = null;
        let selectedUserId = null;
        let onlineUsers = [];
        let myUsername = '';
        let mediaStarted = false;
        
        // WebRTC Configuration - More STUN servers for better connectivity
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' },
                { urls: 'stun:stun.stunprotocol.org:3478' }
            ],
            iceCandidatePoolSize: 10
        };        

        // DOM Elements
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const usersListDiv = document.getElementById('usersList');
        const callBtn = document.getElementById('callBtn');
        const hangupBtn = document.getElementById('hangupBtn');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const incomingModal = document.getElementById('incomingModal');
        const overlay = document.getElementById('overlay');
        
        // ========== AUDIO DEBUGGING ==========
        let audioContext = null;
        let audioAnalyser = null;
        
        function setupAudioDebugging(stream, isLocal) {
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                const source = audioContext.createMediaStreamSource(stream);
                const analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                const checkAudio = setInterval(() => {
                    analyser.getByteTimeDomainData(dataArray);
                    let max = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        const v = Math.abs(dataArray[i] - 128) / 128;
                        if (v > max) max = v;
                    }
                    if (max > 0.05) {
                        console.log(`🎤 ${isLocal ? 'Local' : 'Remote'} Audio detected! Level: ${max.toFixed(3)}`);
                    }
                }, 500);
                
                // Store interval for cleanup
                if (!window.audioIntervals) window.audioIntervals = [];
                window.audioIntervals.push(checkAudio);
                
            } catch (e) {
                console.log('Audio debugging setup failed:', e);
            }
        }
        
        // ========== RINGTONE ==========
        let ringtoneInterval = null;
        
        function playRingtone() {
            if (ringtoneInterval) return;
            
            // Use the shared audio context
            if (!window.audioContext) {
                window.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            // Resume if suspended
            if (window.audioContext.state === 'suspended') {
                window.audioContext.resume().then(() => {
                    playBeep();
                }).catch(e => console.log('Audio context resume failed:', e));
            } else {
                playBeep();
            }
            
            function playBeep() {
                const oscillator = window.audioContext.createOscillator();
                const gainNode = window.audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(window.audioContext.destination);
                
                oscillator.frequency.value = 440; // A4 note
                gainNode.gain.value = 0.3;
                
                oscillator.start();
                oscillator.stop(window.audioContext.currentTime + 0.5);
            }
            
            // Repeat every 2 seconds
            ringtoneInterval = setInterval(() => {
                if (document.getElementById('incomingModal').style.display !== 'block') {
                    stopRingtone();
                    return;
                }
                if (window.audioContext && window.audioContext.state === 'running') {
                    const oscillator = window.audioContext.createOscillator();
                    const gainNode = window.audioContext.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(window.audioContext.destination);
                    oscillator.frequency.value = 440;
                    gainNode.gain.value = 0.3;
                    oscillator.start();
                    oscillator.stop(window.audioContext.currentTime + 0.5);
                }
            }, 2000);
        }        
       
 
        function stopRingtone() {
            if (ringtoneInterval) {
                clearInterval(ringtoneInterval);
                ringtoneInterval = null;
            }
        }
  
        // ========== USER REGISTRATION ==========
        function registerUser() {
            const baseName = prompt('Enter your name:', 'Trader') || 'Trader';
            const cleanName = baseName.replace(/[^a-zA-Z0-9]/g, '');
            const randomNum = Math.floor(Math.random() * 10000);
            myUsername = `${cleanName}_${randomNum}`;
            console.log('📹 Registering user:', myUsername);
            socket.emit('register-video-user', { username: myUsername });
        }
        
        // ========== VIDEO & AUDIO ==========
        async function startVideoAndAudio() {
            if (mediaStarted) return;
            
            try {
                // Initialize audio context for ringtone (user gesture!)
                if (window.audioContext && window.audioContext.state === 'suspended') {
                    await window.audioContext.resume();
                } else if (!window.audioContext) {
                    window.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = myStream;
                mediaStarted = true;
                
                // Setup audio debugging
                setupAudioDebugging(myStream, true);
                
                // List audio devices
                const devices = await navigator.mediaDevices.enumerateDevices();
                const audioInputs = devices.filter(d => d.kind === 'audioinput');
                console.log('🎤 Available microphones:', audioInputs.map(d => d.label));
                
                // Check audio tracks
                const audioTracks = myStream.getAudioTracks();
                console.log('🎤 Audio tracks:', audioTracks.length);
                audioTracks.forEach((track, i) => {
                    console.log(`  Track ${i}: enabled=${track.enabled}, muted=${track.muted}`);
                    console.log(`  Settings:`, track.getSettings());
                });
                
                document.getElementById('startVideoBtn').innerHTML = '<i class="fas fa-check-circle"></i> Camera Active';
                document.getElementById('startVideoBtn').style.background = '#334155';
                setTimeout(() => {
                    const btn = document.getElementById('startVideoBtn');
                    if (btn) btn.style.display = 'none';
                }, 2000);
                
                return true;
            } catch (error) {
                console.error('Camera error:', error);
                alert('Could not access camera or microphone. Please check permissions.');
                return false;
            }
        }       

 
        function toggleMute() {
            if (myStream) {
                const audioTrack = myStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    const btn = document.querySelector('.btn-mute');
                    btn.innerHTML = audioTrack.enabled ? '<i class="fas fa-microphone"></i>' : '<i class="fas fa-microphone-slash"></i>';
                    console.log(`🎤 Microphone ${audioTrack.enabled ? 'unmuted' : 'muted'}`);
                }
            }
        }
        
        function toggleVideo() {
            if (myStream) {
                const videoTrack = myStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    const btn = document.querySelector('.btn-video');
                    btn.innerHTML = videoTrack.enabled ? '<i class="fas fa-video"></i>' : '<i class="fas fa-video-slash"></i>';
                }
            }
        }
        
        // ========== SOCKET EVENTS ==========
        socket.on('connect', () => {
            console.log('✅ Connected to server:', socket.id);
            registerUser();
        });
        
        socket.on('video-user-registered', (data) => {
            console.log('✅ Registered:', data);
            addChatMessage(`You joined as ${data.username}`, 'system');
            updateUsersList(data.users);
        });
        
        socket.on('video-users', (users) => {
            console.log('📹 User list:', users);
            onlineUsers = users;
            updateUsersList(users);
        });
        
        socket.on('user-joined-video', (user) => {
            addChatMessage(`${user.username} joined the chat`, 'system');
        });
        
        socket.on('user-left-video', (user) => {
            addChatMessage(`${user.username} left the chat`, 'system');
            if (currentCallWith === user.userId) hangUp();
        });
        
        socket.on('video-chat-message', (data) => {
            addChatMessage(`${data.username}: ${data.message}`, 'other');
        });
        
        // WebRTC Signaling
        socket.on('webrtc-offer', async (data) => {
            const caller = onlineUsers.find(u => u.userId === data.from);
            const callerName = caller?.username || 'Someone';
            addChatMessage(`📞 Incoming call from ${callerName}...`, 'system');
            currentCallWith = data.from;
            document.getElementById('callerName').textContent = `${callerName} is calling...`;
            overlay.style.display = 'block';
            incomingModal.style.display = 'block';
            window.pendingOffer = data;
            
            // Play ringtone
            playRingtone();
        });

        
        socket.on('webrtc-answer', async (data) => {
            console.log('✅ Received answer');
            if (peerConnection) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            }
        });
        
        socket.on('webrtc-ice', async (data) => {
            if (peerConnection) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });
        
        socket.on('webrtc-end-call', () => {
            hangUp();
        });
        
        // ========== UI FUNCTIONS ==========
        function updateUsersList(users) {
            const myId = socket.id;
            const otherUsers = users?.filter(u => u.userId !== myId) || [];
            
            if (otherUsers.length === 0) {
                usersListDiv.innerHTML = '<div style="color: #64748b; text-align: center; padding: 20px;">No other users online</div>';
                return;
            }
            
            let html = '';
            otherUsers.forEach(user => {
                const isSelected = selectedUserId === user.userId;
                html += `
                    <div class="user-item ${isSelected ? 'selected' : ''}" onclick="selectUser('${user.userId}', '${user.username}')">
                        <div>
                            <div class="user-name">${user.username}</div>
                            <div class="user-status">● Online</div>
                        </div>
                        <i class="fas fa-phone" style="color: #10b981;"></i>
                    </div>
                `;
            });
            usersListDiv.innerHTML = html;
        }
        
        function selectUser(userId, userName) {
            selectedUserId = userId;
            updateUsersList(onlineUsers);
            addChatMessage(`Selected ${userName} as call target`, 'system');
        }
        
        async function startCall() {
            if (!selectedUserId) {
                alert('Please select a user to call first');
                return;
            }
            if (currentCallWith) {
                alert('Already in a call');
                return;
            }
            if (!myStream) {
                const ok = await startVideoAndAudio();
                if (!ok) return;
            }
            
            currentCallWith = selectedUserId;
            
            peerConnection = new RTCPeerConnection(configuration);

            // 🔴 ADD ICE DEBUGGING HERE 🔴
            peerConnection.oniceconnectionstatechange = () => {
                console.log('ICE connection state:', peerConnection.iceConnectionState);
            };
            
            peerConnection.onconnectionstatechange = () => {
                console.log('Connection state:', peerConnection.connectionState);
            };
            
            peerConnection.onsignalingstatechange = () => {
                console.log('Signaling state:', peerConnection.signalingState);
            };

            myStream.getTracks().forEach(track => peerConnection.addTrack(track, myStream));
            
            peerConnection.ontrack = (event) => {
                remoteVideo.srcObject = event.streams[0];
                console.log('✅ Remote stream received');
                // Setup audio debugging for remote stream
                setupAudioDebugging(event.streams[0], false);
            };
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('webrtc-ice', { to: currentCallWith, candidate: event.candidate });
                }
            };
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            socket.emit('webrtc-offer', {
                to: currentCallWith,
                offer: offer,
                caller: socket.id,
                callerName: myUsername
            });
            
            callBtn.style.display = 'none';
            hangupBtn.style.display = 'inline-block';
            addChatMessage(`📞 Calling...`, 'system');
        }
        
        async function acceptCall() {
            // Stop ringtone
            stopRingtone();

            overlay.style.display = 'none';
            incomingModal.style.display = 'none';
            
            if (!myStream) {
                const ok = await startVideoAndAudio();
                if (!ok) return;
            }
            
            const offer = window.pendingOffer;
            if (!offer) return;
            currentCallWith = offer.from;
            
            peerConnection = new RTCPeerConnection(configuration);
            
            // 🔴 ADD ICE DEBUGGING HERE 🔴
            peerConnection.oniceconnectionstatechange = () => {
                console.log('ICE connection state:', peerConnection.iceConnectionState);
            };
            
            peerConnection.onconnectionstatechange = () => {
                console.log('Connection state:', peerConnection.connectionState);
            };
            
            peerConnection.onsignalingstatechange = () => {
                console.log('Signaling state:', peerConnection.signalingState);
            };

            myStream.getTracks().forEach(track => peerConnection.addTrack(track, myStream));
            
            peerConnection.ontrack = (event) => {
                remoteVideo.srcObject = event.streams[0];
                console.log('✅ Remote stream received');
                // Setup audio debugging for remote stream
                setupAudioDebugging(event.streams[0], false);
            };
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('webrtc-ice', { to: currentCallWith, candidate: event.candidate });
                }
            };
            
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            socket.emit('webrtc-answer', { to: currentCallWith, answer: answer });
            
            callBtn.style.display = 'none';
            hangupBtn.style.display = 'inline-block';
            addChatMessage(`📞 Call connected!`, 'system');
        }
        
        function rejectCall() {
            stopRingtone();
            overlay.style.display = 'none';
            incomingModal.style.display = 'none';
            if (window.pendingOffer) {
                socket.emit('webrtc-end-call', { to: window.pendingOffer.from });
                window.pendingOffer = null;
            }
        }
        
        function hangUp() {
            stopRingtone();
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            remoteVideo.srcObject = null;
            if (currentCallWith) {
                socket.emit('webrtc-end-call', { to: currentCallWith });
            }
            currentCallWith = null;
            callBtn.style.display = 'inline-block';
            hangupBtn.style.display = 'none';
            addChatMessage(`📞 Call ended`, 'system');
        }
        
        function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;
            socket.emit('video-chat-message', { message, username: myUsername });
            addChatMessage(`You: ${message}`, 'self');
            chatInput.value = '';
        }
        
        function addChatMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-message ${type}`;
            msgDiv.textContent = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // Make functions global
        window.startCall = startCall;
        window.hangUp = hangUp;
        window.toggleMute = toggleMute;
        window.toggleVideo = toggleVideo;
        window.sendMessage = sendMessage;
        window.selectUser = selectUser;
        window.acceptCall = acceptCall;
        window.rejectCall = rejectCall;
        window.startVideoAndAudio = startVideoAndAudio;
        
        console.log('📹 Video chat ready. Click "Start Camera & Mic" to begin.');
    </script>
</body>
</html>
