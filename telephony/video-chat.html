<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Video Chat - Fatimah Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }

        .header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            color: #fbbf24;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }

        .video-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .video-card h3 {
            color: white;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .video-card video {
            width: 100%;
            background: #0f172a;
            border-radius: 12px;
            min-height: 250px;
            max-height: 300px;
            object-fit: cover;
        }

        .controls {
            background: #1e293b;
            border-radius: 50px;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 20px;
            transition: transform 0.2s;
        }

        .control-btn:hover {
            transform: scale(1.05);
        }

        .btn-call {
            background: #10b981;
            color: white;
        }

        .btn-hangup {
            background: #ef4444;
            color: white;
        }

        .btn-mute, .btn-video {
            background: #334155;
            color: white;
        }

        .users-panel {
            background: #1e293b;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .users-panel h3 {
            color: white;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .users-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #334155;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .user-item:hover {
            background: #475569;
        }

        .user-item.selected {
            background: #10b981;
        }

        .user-name {
            color: white;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .chat-panel {
            background: #1e293b;
            border-radius: 16px;
            padding: 15px;
        }

        .chat-messages {
            height: 150px;
            overflow-y: auto;
            margin-bottom: 10px;
            padding: 10px;
            background: #0f172a;
            border-radius: 12px;
        }

        .chat-message {
            padding: 5px 10px;
            margin: 3px 0;
            border-radius: 10px;
            font-size: 0.85rem;
        }

        .chat-message.self {
            background: #10b981;
            color: white;
            text-align: right;
        }

        .chat-message.other {
            background: #334155;
            color: white;
        }

        .chat-message.system {
            background: #f59e0b;
            color: white;
            text-align: center;
        }

        .chat-input {
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: #334155;
            color: white;
        }

        .chat-input button {
            padding: 10px 20px;
            background: #10b981;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }

        .incoming-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            display: none;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .incoming-modal button {
            margin: 10px;
            padding: 8px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }

        .accept-call {
            background: #10b981;
            color: white;
        }

        .reject-call {
            background: #ef4444;
            color: white;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            z-index: 999;
        }

        .start-btn {
            width: 100%;
            padding: 12px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }

        .footer {
            background: #0f172a;
            padding: 20px;
            text-align: center;
            color: #94a3b8;
            margin-top: 30px;
            font-size: 0.8rem;
        }

        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }
            .control-btn {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav">
            <div class="logo">
                <i class="fas fa-mosque"></i>
                <span>Fatimah Hub</span>
            </div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/trading">Trading</a>
                <a href="/telephony">Telephony</a>
                <a href="/finance-tools">Tools</a>
            </div>
        </nav>
    </header>

    <div class="container">
        <div class="users-panel">
            <h3><i class="fas fa-users"></i> Online Users</h3>
            <div class="users-list" id="usersList">
                <div style="color: #64748b; text-align: center; padding: 15px;">Loading...</div>
            </div>
        </div>

        <div class="video-grid">
            <div class="video-card">
                <h3><i class="fas fa-user"></i> You</h3>
                <video id="localVideo" autoplay muted playsinline></video>
                <button id="startCameraBtn" class="start-btn" onclick="startCamera()">
                    <i class="fas fa-camera"></i> Start Camera
                </button>
            </div>
            <div class="video-card">
                <h3><i class="fas fa-user-friends"></i> Remote User</h3>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn btn-call" id="callBtn" onclick="makeCall()">
                <i class="fas fa-phone"></i>
            </button>
            <button class="control-btn btn-hangup" id="hangupBtn" onclick="endCall()" style="display: none;">
                <i class="fas fa-phone-slash"></i>
            </button>
            <button class="control-btn btn-mute" onclick="toggleMute()">
                <i class="fas fa-microphone"></i>
            </button>
            <button class="control-btn btn-video" onclick="toggleVideo()">
                <i class="fas fa-video"></i>
            </button>
        </div>

        <div class="chat-panel">
            <h3 style="color: white; margin-bottom: 10px;"><i class="fas fa-comment"></i> Chat</h3>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendChatMessage()">
                <button onclick="sendChatMessage()">Send</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="incoming-modal" id="incomingModal">
        <h3 style="color: white; margin-bottom: 15px;"><i class="fas fa-phone-alt"></i> Incoming Call</h3>
        <p style="color: white; margin-bottom: 15px;" id="callerName">Someone is calling...</p>
        <button class="accept-call" onclick="acceptCall()">Accept</button>
        <button class="reject-call" onclick="rejectCall()">Reject</button>
    </div>

    <footer class="footer">
        <p>© 1447-1448 AH / 2026 CE Fatimah Financial Hub</p>
    </footer>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // ========== CONFIGURATION ==========
        const socket = io({
            transports: ['websocket', 'polling'],
            reconnectionAttempts: 3
        });

        // WebRTC configuration with TURN servers
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                {
                    urls: 'turn:global.relay.metered.ca:80',
                    username: '3e1de93950d11795c053f17e',
                    credential: 'FaOkHTSN/naE3poC'
                },
                {
                    urls: 'turn:global.relay.metered.ca:443',
                    username: '3e1de93950d11795c053f17e',
                    credential: 'FaOkHTSN/naE3poC'
                }
            ],
            iceCandidatePoolSize: 5
        };

        // Global variables
        let localStream = null;
        let peerConnection = null;
        let currentCallWith = null;
        let selectedUserId = null;
        let onlineUsers = [];
        let myUsername = '';
        let pendingOffer = null;

        // DOM elements
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const usersListDiv = document.getElementById('usersList');
        const callBtn = document.getElementById('callBtn');
        const hangupBtn = document.getElementById('hangupBtn');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const incomingModal = document.getElementById('incomingModal');
        const overlay = document.getElementById('overlay');

        // ========== CAMERA ==========
        async function startCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
                console.log('✅ Camera started');
                document.getElementById('startCameraBtn').style.display = 'none';
                addChatMessage('Camera and microphone ready', 'system');
                return true;
            } catch (error) {
                console.error('Camera error:', error);
                alert('Could not access camera. Please check permissions.');
                return false;
            }
        }

        function toggleMute() {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    const btn = document.querySelector('.btn-mute');
                    btn.innerHTML = audioTrack.enabled ? '<i class="fas fa-microphone"></i>' : '<i class="fas fa-microphone-slash"></i>';
                }
            }
        }

        function toggleVideo() {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    const btn = document.querySelector('.btn-video');
                    btn.innerHTML = videoTrack.enabled ? '<i class="fas fa-video"></i>' : '<i class="fas fa-video-slash"></i>';
                }
            }
        }

        // ========== SOCKET EVENTS ==========
        socket.on('connect', () => {
            console.log('Connected to server');
            const name = prompt('Enter your name:', 'Trader') || 'Trader';
            myUsername = name + '_' + Math.floor(Math.random() * 10000);
            socket.emit('register-video-user', { username: myUsername });
        });

        socket.on('video-user-registered', (data) => {
            console.log('Registered:', data.username);
            updateUsersList(data.users);
        });

        socket.on('video-users', (users) => {
            onlineUsers = users;
            updateUsersList(users);
        });

        socket.on('user-joined-video', (user) => {
            addChatMessage(`${user.username} joined`, 'system');
        });

        socket.on('user-left-video', (user) => {
            addChatMessage(`${user.username} left`, 'system');
            if (currentCallWith === user.userId) endCall();
        });

        socket.on('video-chat-message', (data) => {
            addChatMessage(`${data.username}: ${data.message}`, 'other');
        });

        // WebRTC signaling
        socket.on('webrtc-offer', async (data) => {
            console.log('📞 Incoming call from:', data.callerName);
            currentCallWith = data.from;
            document.getElementById('callerName').textContent = `${data.callerName} is calling...`;
            pendingOffer = data;
            overlay.style.display = 'block';
            incomingModal.style.display = 'block';
        });

        socket.on('webrtc-answer', async (data) => {
            console.log('Received answer');
            if (peerConnection) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            }
        });

        socket.on('webrtc-ice', async (data) => {
            if (peerConnection) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });

        socket.on('webrtc-end-call', () => {
            endCall();
        });

        // ========== UI FUNCTIONS ==========
        function updateUsersList(users) {
            const myId = socket.id;
            const otherUsers = users?.filter(u => u.userId !== myId) || [];

            if (otherUsers.length === 0) {
                usersListDiv.innerHTML = '<div style="color: #64748b; text-align: center; padding: 15px;">No other users online</div>';
                return;
            }

            let html = '';
            otherUsers.forEach(user => {
                const isSelected = selectedUserId === user.userId;
                html += `
                    <div class="user-item ${isSelected ? 'selected' : ''}" onclick="selectUser('${user.userId}', '${user.username}')">
                        <div>
                            <div class="user-name">${user.username}</div>
                            <div style="font-size: 11px; color: #10b981;">● Online</div>
                        </div>
                        <i class="fas fa-phone" style="color: #10b981;"></i>
                    </div>
                `;
            });
            usersListDiv.innerHTML = html;
        }

        function selectUser(userId, userName) {
            selectedUserId = userId;
            updateUsersList(onlineUsers);
            addChatMessage(`Selected ${userName} for call`, 'system');
        }

        // ========== WEBRTC CALL FUNCTIONS ==========
        async function makeCall() {
            if (!selectedUserId) {
                alert('Please select a user first');
                return;
            }
            if (currentCallWith) {
                alert('Already in a call');
                return;
            }
            if (!localStream) {
                const started = await startCamera();
                if (!started) return;
            }

            currentCallWith = selectedUserId;

            peerConnection = new RTCPeerConnection(configuration);

            // Add local tracks
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });

            // Handle remote stream
            peerConnection.ontrack = (event) => {
                console.log('Remote track:', event.track.kind);
                if (event.streams && event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                }
            };

            // Handle ICE candidates
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('webrtc-ice', { to: currentCallWith, candidate: event.candidate });
                }
            };

            // Create and send offer
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            socket.emit('webrtc-offer', {
                to: currentCallWith,
                offer: offer,
                caller: socket.id,
                callerName: myUsername
            });

            callBtn.style.display = 'none';
            hangupBtn.style.display = 'inline-block';
            addChatMessage(`Calling...`, 'system');
        }

        async function acceptCall() {
            overlay.style.display = 'none';
            incomingModal.style.display = 'none';

            if (!localStream) {
                const started = await startCamera();
                if (!started) return;
            }

            if (!pendingOffer) return;
            currentCallWith = pendingOffer.from;

            peerConnection = new RTCPeerConnection(configuration);

            // Add local tracks
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });

            // Handle remote stream
            peerConnection.ontrack = (event) => {
                console.log('Remote track:', event.track.kind);
                if (event.streams && event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                }
            };

            // Handle ICE candidates
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('webrtc-ice', { to: currentCallWith, candidate: event.candidate });
                }
            };

            // Set remote description and create answer
            await peerConnection.setRemoteDescription(new RTCSessionDescription(pendingOffer.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            socket.emit('webrtc-answer', { to: currentCallWith, answer: answer });

            callBtn.style.display = 'none';
            hangupBtn.style.display = 'inline-block';
            addChatMessage(`Call connected!`, 'system');
            pendingOffer = null;
        }

        function rejectCall() {
            overlay.style.display = 'none';
            incomingModal.style.display = 'none';
            if (pendingOffer) {
                socket.emit('webrtc-end-call', { to: pendingOffer.from });
                pendingOffer = null;
            }
            currentCallWith = null;
        }

        function endCall() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            remoteVideo.srcObject = null;
            if (currentCallWith) {
                socket.emit('webrtc-end-call', { to: currentCallWith });
            }
            currentCallWith = null;
            callBtn.style.display = 'inline-block';
            hangupBtn.style.display = 'none';
            addChatMessage(`Call ended`, 'system');
        }

        // ========== CHAT FUNCTIONS ==========
        function sendChatMessage() {
            const message = chatInput.value.trim();
            if (!message) return;
            socket.emit('video-chat-message', { message, username: myUsername });
            addChatMessage(`You: ${message}`, 'self');
            chatInput.value = '';
        }

        function addChatMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-message ${type}`;
            msgDiv.textContent = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Make functions global
        window.startCamera = startCamera;
        window.makeCall = makeCall;
        window.endCall = endCall;
        window.toggleMute = toggleMute;
        window.toggleVideo = toggleVideo;
        window.sendChatMessage = sendChatMessage;
        window.selectUser = selectUser;
        window.acceptCall = acceptCall;
        window.rejectCall = rejectCall;

        console.log('📹 Video chat ready. Click Start Camera first, then select a user and call.');
    </script>
</body>
</html>
