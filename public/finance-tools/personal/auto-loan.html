<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Loan Calculator</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/shared/navigation.css">
</head>
<body>
    <!-- FATIMAH FINANCIAL HUB - GLOBAL NAVIGATION -->
    <!-- Navigation -->
    <div id="main-navigation"></div>
    <script>
        fetch('/shared/navigation.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('main-navigation').innerHTML = data;
            })
            .catch(error => console.error('Failed to load navigation:', error));
    </script>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-car"></i> Auto Loan Calculator</h1>
            <p>Calculate your car loan payments with trade-in and tax options</p>
            <a href="index.html" class="back-link">← Back to Personal Finance Hub</a>
        </div>
        
        <!-- Calculator Card -->
        <div class="calculator-card">
            <div id="calculator-inputs">
                <!-- Vehicle Price -->
                <div class="input-group">
                    <label for="vehicle-price">Vehicle Price ($)</label>
                    <input type="number" id="vehicle-price" class="form-input" value="30000">
                </div>
                
                <!-- Down Payment -->
                <div class="input-group">
                    <label for="down-payment">Down Payment ($)</label>
                    <input type="number" id="down-payment" class="form-input" value="5000">
                </div>
                
                <!-- Trade-in Value -->
                <div class="input-group">
                    <label for="trade-in">Trade-in Value ($)</label>
                    <input type="number" id="trade-in" class="form-input" value="0">
                </div>
                
                <!-- Loan Term -->
                <div class="input-group">
                    <label for="loan-years">Loan Term (years)</label>
                    <select id="loan-years" class="form-input">
                        <option value="3">3 years</option>
                        <option value="4">4 years</option>
                        <option value="5" selected>5 years</option>
                        <option value="6">6 years</option>
                        <option value="7">7 years</option>
                    </select>
                </div>
                
                <!-- Interest Rate -->
                <div class="input-group">
                    <label for="interest-rate">Interest Rate (%)</label>
                    <input type="number" id="interest-rate" class="form-input" value="6.5" step="0.1">
                    <div class="input-hint">Current average auto loan rate: 6.5%</div>
                </div>
                
                <!-- Sales Tax -->
                <div class="input-group">
                    <label for="sales-tax">Sales Tax Rate (%)</label>
                    <input type="number" id="sales-tax" class="form-input" value="7" step="0.1">
                </div>
                
                <!-- Fees -->
                <div class="input-group">
                    <label for="fees">Fees & Registration ($)</label>
                    <input type="number" id="fees" class="form-input" value="500">
                </div>
            </div>
            
            <!-- Calculate Button -->
            <button id="calculate-auto" class="calculate-btn">
                Calculate Auto Loan <i class="fas fa-calculator"></i>
            </button>
            
            <!-- Results -->
            <div id="auto-results" class="results">
                Enter values and click calculate
            </div>
        </div>
        
        <!-- Footer Links -->
        <div class="footer-links">
            <a href="education-savings.html">🎓 Education Savings Calculator →</a>
            <a href="../global/index.html">🌍 Global Calculators →</a>
        </div>
    </div>
    
    <!-- JavaScript -->
    <script src="../shared/config.js"></script>
    <script src="../shared/calculators.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        console.log('Auto Loan Calculator loaded');
        
        // Get calculate button
        const calculateBtn = document.getElementById('calculate-auto');
        
        calculateBtn.addEventListener('click', function() {
            // Get input values
            const vehiclePrice = parseFloat(document.getElementById('vehicle-price').value) || 0;
            const downPayment = parseFloat(document.getElementById('down-payment').value) || 0;
            const tradeIn = parseFloat(document.getElementById('trade-in').value) || 0;
            const years = parseFloat(document.getElementById('loan-years').value) || 5;
            const rate = parseFloat(document.getElementById('interest-rate').value) || 6.5;
            const salesTax = parseFloat(document.getElementById('sales-tax').value) || 0;
            const fees = parseFloat(document.getElementById('fees').value) || 0;
            
            // Show loading
            const resultsDiv = document.getElementById('auto-results');
            resultsDiv.innerHTML = '<div class="loading">Calculating...</div>';
            
            // Calculate
            setTimeout(function() {
                if (window.FinancialCalculators) {
                    const calc = new FinancialCalculators();
                    const result = calc.calculateAutoLoan({
                        vehiclePrice: vehiclePrice,
                        downPayment: downPayment,
                        tradeInValue: tradeIn,
                        years: years,
                        rate: rate,
                        salesTax: salesTax,
                        fees: fees,
                        country: 'US' // Default for now
                    });
                    
                    console.log('Auto loan result:', result);
               
                    // Display results
                    if (result.success) {
                        resultsDiv.innerHTML = `
                            <div class="result-card">
                                <h3><i class="fas fa-file-invoice-dollar"></i> Loan Summary</h3>
                                <div class="result-grid">
                                    <div class="result-item">
                                        <span class="label">Monthly Payment:</span>
                                        <span class="value">${result.monthlyPayment}</span>
                                    </div>
                                    <div class="result-item">
                                        <span class="label">Loan Amount:</span>
                                        <span class="value">${result.loanAmount}</span>
                                    </div>
                                    <div class="result-item">
                                        <span class="label">Total Cost:</span>
                                        <span class="value">${result.totalCost}</span>
                                    </div>
                                    <div class="result-item">
                                        <span class="label">Total Interest:</span>
                                        <span class="value">${result.totalInterest}</span>
                                    </div>
                                    <div class="result-item">
                                        <span class="label">Total Paid:</span>
                                        <span class="value">${result.totalPaid}</span>
                                    </div>
                                    <div class="result-item">
                                        <span class="label">Out of Pocket:</span>
                                        <span class="value">${result.totalOutOfPocket || 'N/A'}</span>
                                    </div>
                                </div>
                                ${result.message ? `<div class="note">${result.message}</div>` : ''}
                            </div>
                        `;
                    } else {
                        resultsDiv.innerHTML = `<div class="error">Error: ${result.error}</div>`;
                    }
                } else {
                    resultsDiv.innerHTML = '<div class="error">Calculators not loaded</div>';
                }
            }, 300);
        });
    });
    </script>
    <!-- FOOTER NAVIGATION -->
    <div id="main-footer"></div>
    <script>
        fetch('/shared/footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('main-footer').innerHTML = data;
            })
            .catch(error => console.error('Failed to load footer:', error));
    </script>

</body>
</html>
