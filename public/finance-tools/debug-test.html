<!DOCTYPE html>
<html>
<head>
    <title>Debug Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .step { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .loading { background: #fff3cd; border: 1px solid #ffeaa7; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <h1>Config.js Debug Test</h1>
    
    <div class="step loading" id="step1">Step 1: Testing HTML load...</div>
    <div class="step loading" id="step2">Step 2: Testing config.js load...</div>
    <div class="step loading" id="step3">Step 3: Testing FinancialConfig object...</div>
    
    <div id="details" style="margin-top: 20px; display: none;">
        <h3>Details:</h3>
        <pre id="detail-content"></pre>
    </div>

<script>
// Step 1: HTML loaded
document.getElementById('step1').className = 'step success';
document.getElementById('step1').innerHTML = 'Step 1: ✅ HTML document loaded';

// Load config.js dynamically
console.log('Attempting to load config.js...');

const script = document.createElement('script');
script.src = 'config.js';

script.onload = function() {
    console.log('config.js loaded successfully');
    document.getElementById('step2').className = 'step success';
    document.getElementById('step2').innerHTML = 'Step 2: ✅ config.js file loaded';
    
    // Check if FinancialConfig exists
    setTimeout(function() {
        if (typeof FinancialConfig === 'undefined') {
            document.getElementById('step3').className = 'step error';
            document.getElementById('step3').innerHTML = 'Step 3: ❌ FinancialConfig is undefined';
            console.error('FinancialConfig is not defined');
        } else {
            document.getElementById('step3').className = 'step success';
            
            // Count countries
            const countries = Object.keys(FinancialConfig.countryData || {});
            const chinaExists = FinancialConfig.countryData['CN'] ? '✅' : '❌';
            const russiaExists = FinancialConfig.countryData['RU'] ? '✅' : '❌';
            
            document.getElementById('step3').innerHTML = 
                `Step 3: ✅ FinancialConfig object exists!<br>` +
                `- Total countries: ${countries.length}<br>` +
                `- China: ${chinaExists}<br>` +
                `- Russia: ${russiaExists}`;
            
            // Show details
            document.getElementById('details').style.display = 'block';
            document.getElementById('detail-content').textContent = 
                'Available countries: ' + countries.join(', ') + '\n\n' +
                'China data: ' + JSON.stringify(FinancialConfig.countryData['CN'], null, 2) + '\n\n' +
                'Russia data: ' + JSON.stringify(FinancialConfig.countryData['RU'], null, 2);
            
            console.log('FinancialConfig:', FinancialConfig);
            console.log('Countries:', countries);
        }
    }, 100);
};

script.onerror = function(error) {
    console.error('Failed to load config.js:', error);
    document.getElementById('step2').className = 'step error';
    document.getElementById('step2').innerHTML = 'Step 2: ❌ Failed to load config.js';
    document.getElementById('step3').className = 'step error';
    document.getElementById('step3').innerHTML = 'Step 3: Cannot proceed - config.js failed to load';
    
    // Show error details
    document.getElementById('details').style.display = 'block';
    document.getElementById('detail-content').textContent = 
        'Error loading config.js\n' +
        'Check: \n' +
        '1. File exists in same directory\n' +
        '2. No JavaScript syntax errors\n' +
        '3. Browser console for details';
};

// Add script to document
document.head.appendChild(script);
</script>
</body>
</html>
